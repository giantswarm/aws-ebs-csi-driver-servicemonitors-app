{{- if not .Values.disabled }}
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  labels:
    {{- include "aws-ebs-csi-driver-servicemonitors.labels" . | nindent 4 }}
  name: aws-ebs-csi-driver-controller
  namespace: kube-system
spec:
  namespaceSelector:
    matchNames:
      - kube-system
  podMetricsEndpoints:
    - port: metrics
    - port: metrics-attach
    - port: metrics-lp
    - port: metrics-prov
    - port: metrics-resizer
    - port: metrics-snap
  selector:
    matchLabels:
      app: ebs-csi-controller
{{- end }}
